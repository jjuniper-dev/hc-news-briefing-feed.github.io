name: Site Test Plan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repo-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate JSON and YAML syntax
        run: |
          python -m pip install --upgrade pip pyyaml
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          root = Path(".")
          json_files = list(root.rglob("*.json"))
          yaml_files = list((root / ".github" / "workflows").glob("*.yml"))
          yaml_files += list((root / ".github" / "workflows").glob("*.yaml"))
          yaml_files += [root / "feeds.yaml"]
          skip_parts = {".git"}

          def is_skipped(path: Path) -> bool:
              return any(part in skip_parts for part in path.parts)

          for path in json_files:
              if is_skipped(path):
                  continue
              with path.open("r", encoding="utf-8") as f:
                  json.load(f)
          for path in yaml_files:
              if is_skipped(path):
                  continue
              with path.open("r", encoding="utf-8") as f:
                  yaml.safe_load(f)

          print(f"Validated {len(json_files)} JSON and {len(yaml_files)} YAML files (workflows + feeds.yaml).")
          PY

  content-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
      - name: Check links in docs and pages
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --no-progress
            --retry-wait-time 2
            --max-retries 2
            --accept 200,206,301,302,403,429
            README.md docs/**/*.md reviews/**/*.md ./**/*.html

  static-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Functional smoke checks
        run: python scripts/test_functional.py
      - name: Accessibility baseline checks
        run: python scripts/test_accessibility.py
      - name: Performance budget checks
        run: python scripts/test_performance_budget.py
      - name: Architecture contract checks
        run: python scripts/validate_site_architecture.py

  security-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate deployed headers (GitHub Pages)
        env:
          SITE_URL: ${{ format('https://{0}.github.io/{1}/', github.repository_owner, github.event.repository.name) }}
        run: python scripts/check_security_headers.py
