<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligence Editor</title>
  <link rel="stylesheet" href="intelligence-editor.css" />
</head>
<body>
  <main class="layout">
    <header class="layout__header">
      <h1>Intelligence Editor</h1>
      <p>Draft intelligence updates, import source files, and review AI-assisted findings.</p>
      <a href="index.html">← Back to dashboard</a>
    </header>

    <section class="editor-card" aria-label="Intelligence editor">
      <div id="intelligence-toolbar" class="toolbar">
        <button type="button" id="btn-preview" title="Refresh preview">🔄 Preview</button>
      </div>

      <div class="editor-grid">
        <div>
          <label for="intelligence-markdown-editor">Markdown Draft</label>
          <textarea
            id="intelligence-markdown-editor"
            class="markdown-input"
            rows="16"
            placeholder="# Situation update\n\nAdd details here..."
          ></textarea>
        </div>

        <div>
          <h2>Preview</h2>
          <article id="markdown-preview" class="panel"></article>
        </div>
      </div>
    </section>

    <section class="review-card" aria-label="AI review">
      <h2>AI Review</h2>
      <div id="ai-review-output" class="panel">Upload/import content to generate AI feedback.</div>
    </section>
  </main>

  <!-- Optional parsing dependencies. The editor gracefully degrades if unavailable. -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.9.0/mammoth.browser.min.js"></script>

  <script src="intelligence-editor.js"></script>
  <script src="intelligence-editor.bootstrap.js"></script>
</body>
</html>
