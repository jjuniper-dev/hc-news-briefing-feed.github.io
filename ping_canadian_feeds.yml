name: Canadian Feed Uptime Pings

on:
  schedule:
    - cron: '0 * * * *' # every hour on the hour
  workflow_dispatch:

jobs:
  ping-canadian-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Ping CBC & CTV feeds
        run: |
          python3 - <<'EOF'
          import json
          from datetime import datetime

          import feedparser
          import requests

          feeds = {
              "CBC": "https://rss.cbc.ca/lineup/topstories.xml",
              "CTV": "https://www.ctvnews.ca/rss/ctvnews-ca-canada-1.2089050",
          }

          timestamp = datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          record = {"timestamp": timestamp}
          for name, url in feeds.items():
              try:
                  response = requests.get(url, timeout=10)
                  response.raise_for_status()
                  record[name] = bool(feedparser.parse(response.content).entries)
              except Exception:
                  record[name] = False

          path = 'uptime.json'
          try:
              with open(path, 'r', encoding='utf-8') as f:
                  data = json.load(f)
          except Exception:
              data = []

          data.append(record)
          data = data[-168:]

          with open(path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Commit & push uptime.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uptime.json
          ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "chore: add uptime ping ${ts}" || echo "No changes"
          git push
