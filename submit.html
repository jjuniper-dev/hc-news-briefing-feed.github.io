<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>State of Democracy Tracker – Admin Log</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121b2f;
      --panel-2: #16213a;
      --line: #2a3555;
      --text: #d7e1ff;
      --muted: #9eb0da;
      --accent: #5aa0ff;
      --good: #34d399;
      --danger: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at 25% -10%, #1a2b52, var(--bg) 50%);
      color: var(--text);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .top-nav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.9rem;
    }

    .top-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.86rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.28rem 0.65rem;
      background: var(--panel-2);
    }

    .top-nav a.active {
      color: var(--text);
      border-color: #31579c;
      background: #122446;
    }

    h1 {
      margin: 0 0 0.9rem;
      font-size: 1.5rem;
    }
    form {
      background: color-mix(in srgb, var(--panel), #000 8%);
      border: 1px solid var(--line);
      padding: 1rem;
      border-radius: 12px;
    }

    label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    input, select, textarea {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
      border-radius: 5px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
    }
    button {
      background-color: var(--accent);
      color: #fff;
      padding: 0.6rem 0.9rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      filter: brightness(1.08);
    }

    #status {
      margin-top: 0.9rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    #status.success { color: var(--good); }
    #status.error { color: var(--danger); }

    .hint {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.84rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <nav class="top-nav" aria-label="Site navigation">
      <a href="./index.html">News Dashboard</a>
      <a href="./path-architecture.html">PATH Architecture</a>
      <a class="active" href="./submit.html">Admin Submission</a>
    </nav>

    <h1>🗳️ State of Democracy Tracker – Admin Entry</h1>
    <form id="democracyForm">
      <label for="date">Date:</label>
      <input type="date" id="date" name="date" required>

      <label for="branch">Branch:</label>
      <select id="branch" name="branch" required>
        <option value="">Select...</option>
        <option value="Executive">Executive</option>
        <option value="Legislative">Legislative</option>
        <option value="Judicial">Judicial</option>
        <option value="State">State/Local</option>
      </select>

      <label for="action">Action / Event Title:</label>
      <input type="text" id="action" name="action" required>

      <label for="source">Source / Publisher:</label>
      <input type="text" id="source" name="source" required>

      <label for="url">Link to Source:</label>
      <input type="url" id="url" name="url">

      <label for="notes">Description / Notes:</label>
      <textarea id="notes" name="notes" rows="4" required></textarea>

      <button type="submit">Download Entry JSON</button>
      <p class="hint">This page currently exports the entry locally for manual upload to your pipeline.</p>
      <div id="status" aria-live="polite"></div>
    </form>
  </main>

  <script>
    document.getElementById("democracyForm").addEventListener("submit", function(event) {
      event.preventDefault();
      const status = document.getElementById("status");
      const data = {
        date: this.date.value,
        branch: this.branch.value,
        action: this.action.value,
        source: this.source.value,
        url: this.url.value,
        notes: this.notes.value
      };

      try {
        const filename = `democracy-entry-${data.date || "undated"}.json`;
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);

        status.className = "success";
        status.textContent = `Saved ${filename}.`;
      } catch (err) {
        status.className = "error";
        status.textContent = `Export failed: ${err.message}`;
      }
    });
  </script>
</body>
</html>
