<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>News Briefing Feed – Admin Entry</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      color: #333;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #0066cc;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #004d99;
    }

    .top-nav {
      margin-bottom: 1rem;
    }
    .top-nav-list {
      list-style: none;
      margin: 0;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-radius: 10px;
      border: 1px solid #d8dce6;
      background: #ffffff;
    }
    .top-nav-list a {
      text-decoration: none;
      color: #2c467c;
      border: 1px solid #b5c6ee;
      background: #edf2ff;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.84rem;
      font-weight: 600;
      display: inline-block;
    }
    .top-nav-list a.active {
      color: #ffffff;
      border-color: #1f59b8;
      background: #2e68c7;
    }
  </style>
</head>
<body>
  <nav class="top-nav" aria-label="Primary">
    <ul class="top-nav-list">
      <li><a href="./index.html">News Dashboard</a></li>
      <li><a href="./intelligence.html">PATH Intelligence</a></li>
      <li><a href="./path-architecture.html">PATH Architecture</a></li>
      <li><a href="./artifacts.html">Artifacts Index</a></li>
      <li><a href="./submit.html" class="active">Admin Entry</a></li>
    </ul>
  </nav>
  <h1>🗞️ News Briefing Feed – Admin Entry</h1>
  <form id="adminEntryForm">
    <label for="date">Date:</label>
    <input type="date" id="date" name="date" required>

    <label for="branch">Branch:</label>
    <select id="branch" name="branch" required>
      <option value="">Select...</option>
      <option value="Executive">Executive</option>
      <option value="Legislative">Legislative</option>
      <option value="Judicial">Judicial</option>
      <option value="State">State/Local</option>
    </select>

    <label for="action">Action / Event Title:</label>
    <input type="text" id="action" name="action" required>

    <label for="source">Source / Publisher:</label>
    <input type="text" id="source" name="source" required>

    <label for="url">Link to Source:</label>
    <input type="url" id="url" name="url">

    <label for="notes">Description / Notes:</label>
    <textarea id="notes" name="notes" rows="4" required></textarea>

    <button type="submit">Submit Entry</button>
  </form>

  <script>
    document.getElementById("adminEntryForm").addEventListener("submit", function(event) {
      event.preventDefault();
      const data = {
        date: this.date.value,
        branch: this.branch.value,
        action: this.action.value,
        source: this.source.value,
        url: this.url.value,
        notes: this.notes.value
      };
      fetch("YOUR_WEBHOOK_OR_ENDPOINT_HERE", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      }).then(res => {
        if (res.ok) {
          alert("Entry submitted successfully.");
          this.reset();
        } else {
          alert("Entry submission failed.");
        }
      });
    });
  </script>
</body>
</html>
